<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/edit_profile.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="container">
    <h2>Edit Profile</h2>

    <form action="{{ url_for('edit_profile') }}" method="POST" enctype="multipart/form-data">

        <!-- Name Input with Inline Edit Icon -->
        <div class="form-group">
            <label for="name"><i class="fa fa-user"></i> Name</label>
            <div class="input-wrapper">
                <input type="text" name="name" id="name" value="{{ user['name'] }}" required>
                <i class="fa fa-pen edit-icon"></i>
            </div>
        </div>

        <!-- Profile Image Avatar + Plus Icon -->
        <div class="form-group profile-image-wrapper">
            <div class="current-image">
                <img id="profilePic" class="profile-pic" src="{{ url_for('static', filename='uploads/profiles/' + (user['profile_image'] or 'default.jpeg')) }}" alt="Profile Image">
                <i class="fa fa-plus-circle plus-icon" id="plusIcon"></i>
            </div>

            <!-- Hidden File Input -->
            <input type="file" name="profile_image" id="profile_image" accept="image/*" style="display:none;">

            <!-- Popup for Upload/Delete -->
            <div class="popup" id="imagePopup">
                <div class="popup-option" id="uploadOption"><i class="fa fa-upload"></i> Upload</div>
                <div class="popup-option" id="deleteOption"><i class="fa fa-trash"></i> Delete</div>
            </div>
        </div>

        <button type="submit" class="btn-submit"><i class="fa fa-save"></i> Save Changes</button>
    </form>

    <div class="back-link">
        <a href="{{ url_for('profile') }}"><i class="fa fa-arrow-left"></i> Back to Profile</a>
    </div>
</div>

<script>
    const plusIcon = document.getElementById('plusIcon');
    const imagePopup = document.getElementById('imagePopup');
    const uploadInput = document.getElementById('profile_image');
    const profilePic = document.getElementById('profilePic');
    const uploadOption = document.getElementById('uploadOption');
    const deleteOption = document.getElementById('deleteOption');

    // Toggle popup
    plusIcon.addEventListener('click', () => {
        imagePopup.classList.toggle('show');
    });

    // Upload option triggers hidden file input
    uploadOption.addEventListener('click', () => {
        uploadInput.click();
    });

    // Preview selected image
    uploadInput.addEventListener('change', () => {
        if (uploadInput.files && uploadInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                profilePic.src = e.target.result;
            };
            reader.readAsDataURL(uploadInput.files[0]);
        }
        imagePopup.classList.remove('show');
    });

    // Delete option resets to default
    deleteOption.addEventListener('click', () => {
        profilePic.src = "{{ url_for('static', filename='uploads/profiles/default.jpeg') }}";
        uploadInput.value = "";  // reset input
        imagePopup.classList.remove('show');
    });

    // Close popup if click outside
    document.addEventListener('click', (e) => {
        if (!imagePopup.contains(e.target) && !plusIcon.contains(e.target)) {
            imagePopup.classList.remove('show');
        }
    });
</script>

</body>
</html>
